name: Prisma Schema Guard

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  prisma-schema-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Prisma migration guard
        run: node scripts/prisma-migration-guard.mjs --base=origin/main
